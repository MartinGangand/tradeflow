name: Upload Python Package to PyPi

on:
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  update-version-number:
    name: Update version number
    runs-on: ubuntu-latest

    outputs:
      NEW_VERSION: ${{ steps.update_version.outputs.NEW_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update version number in pyproject.toml
        id: update_version
        run: |
          # Get the current version from pyproject.toml
          OLD_VERSION=$(grep ^version pyproject.toml | cut -d '"' -f 2)
          echo "Old version: $OLD_VERSION"

          # Parse the current version
          IFS='.' read -r major minor patch patch2 <<< "$OLD_VERSION"
          
          # Increment the patch version
          patch2=$((patch2 + 1))

          # Construct the new version
          NEW_VERSION="$major.$minor.$patch.$patch2"
          echo "New version: $NEW_VERSION"

          # Replace the version in pyproject.toml
          sed -i "s+version = \"$OLD_VERSION\"+version = \"$NEW_VERSION\"+g" pyproject.toml
          
          # Set the new version as an output variable for later steps
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Save the updated pyproject.toml as an artifact
          mkdir -p .github/artifacts
          cp pyproject.toml .github/artifacts/pyproject.toml

      - name: Upload updated pyproject.toml as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyproject-toml
          path: .github/artifacts/pyproject.toml

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [update-version-number]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download updated pyproject.toml
        uses: actions/download-artifact@v4
        with:
          name: pyproject-toml

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.20.0

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    needs: [update-version-number]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download updated pyproject.toml artifact
        uses: actions/download-artifact@v4
        with:
          name: pyproject-toml

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload-pypi:
    name: Upload Package to PyPi
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/tradeflow

    permissions:
      id-token: write

    #    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/


  verify-uploaded-content-pypi:
    name: Run script to verify the uploaded content on PyPi
    needs: [update-version-number, upload-pypi]
    runs-on: ubuntu-latest
    env:
      NEW_VERSION: ${{ needs.update-version-number.outputs.NEW_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.6'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts-requirements.txt

      - name: Add package directory to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run script with index 'pypi' and package version $NEW_VERSION
        run: python scripts/pypi_verify_uploaded_content.py pypi $NEW_VERSION

  post-upload-pypi:
    name: Test package installation and usage from PyPi
    needs: [update-version-number, upload-pypi]
    runs-on: ${{ matrix.os }}
    env:
      NEW_VERSION: ${{ needs.update-version-number.outputs.NEW_VERSION }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-latest, macos-13, macos-latest, windows-2019, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Wait some time before installing the package, otherwise it might not install the freshly uploaded version
      - name: Sleep for 4 minutes
        run: sleep 240

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest toml numpy

      - name: Run test with index 'pypi' and package version $NEW_VERSION
        run: pytest pypi_post_upload_test --index pypi --package_version $NEW_VERSION -v -s --log-level=WARNING --color=yes
        shell: bash

  push-new-version:
    name:  Push New Version to Main Branch
    needs: [update-version-number, upload-pypi]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.BOT_ACCESS_TOKEN }}

      - name: Download updated pyproject.toml artifact
        uses: actions/download-artifact@v4
        with:
          name: pyproject-toml

      - name: Push version
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml
          git commit -m "Update version number to ${{ needs.update-version-number.outputs.NEW_VERSION }}"
          git status
          git push origin HEAD:main2
